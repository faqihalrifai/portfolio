    <button id="backTop" onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-8 right-8 w-14 h-14 rounded-2xl bg-gold text-white shadow-2xl opacity-0 invisible translate-y-6 transition-all z-50 flex items-center justify-center hover:bg-black group">

    <script>
        // Security & Smooth Scroll
        document.addEventListener('contextmenu', e => e.preventDefault());
        const lenis = new Lenis({ duration: 1.2 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        let allPosts = [];

        async function fetchPosts() {
            try {
                const res = await fetch(`https://dev-faqihalrf.pantheonsite.io/wp-json/wp/v2/posts?_embed&per_page=45&cb=${Date.now()}`);
                allPosts = await res.json();
                renderPosts(allPosts);
            } catch (err) {
                document.getElementById('blogGrid').innerHTML = '<p class="text-center col-span-full py-20 text-red-400 font-serif italic text-xl">Koneksi pangkalan data terputus.</p>';
            }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('blogGrid');
            const noRes = document.getElementById('noResults');
            if(posts.length === 0) { grid.innerHTML = ''; noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');

            grid.innerHTML = posts.map(post => {
                let img = 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800';
                if (post._embedded?.['wp:featuredmedia']?.[0]) {
                    img = `https://wsrv.nl/?url=${encodeURIComponent(post._embedded['wp:featuredmedia'][0].source_url)}&w=800&h=600&fit=cover&output=webp&q=80`;
                }
                const cat = post._embedded?.['wp:term']?.[0]?.[0]?.name || 'Insight';
                const date = new Date(post.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                const rawExcerpt = post.excerpt.rendered.replace(/<[^>]*>/g, '');
                const excerpt = rawExcerpt.length > 95 ? rawExcerpt.substring(0, 95) + '...' : rawExcerpt;

                return `
                    <article class="blog-card flex flex-col bg-white dark:bg-darkCard rounded-[3.5rem] overflow-hidden group">
                        <div class="h-72 overflow-hidden relative">
                            <img src="${img}" class="w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110" loading="lazy">
                            <div class="absolute top-8 left-8 bg-white/90 dark:bg-black/80 backdrop-blur-md text-black dark:text-white text-[8px] font-black px-4 py-2 rounded-xl uppercase tracking-[0.2em]">${cat}</div>
                        </div>
                        <div class="p-10 flex flex-col flex-1 border-x border-b border-black/5 dark:border-white/5 rounded-b-[3.5rem]">
                            <span class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-4 flex items-center gap-3">
                                <span class="w-6 h-px bg-gold/30"></span> ${date}
                            </span>
                            <h2 class="text-xl font-serif font-bold dark:text-white mb-5 line-clamp-2 italic group-hover:text-gold transition-colors">
                                ${post.title.rendered}
                            </h2>
                            <p class="text-gray-500 dark:text-gray-400 text-xs leading-relaxed mb-8 line-clamp-2">${excerpt}</p>
                            <a href="${post.link}" target="_blank" class="mt-auto text-[10px] font-black uppercase tracking-[0.3em] text-gold flex items-center gap-4 group/btn">
                                Pelajari Detail <i class="fas fa-chevron-right text-[7px] transition-transform group-hover/btn:translate-x-2"></i>
                            </a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPosts.filter(p => p.title.rendered.toLowerCase().includes(query) || p.excerpt.rendered.toLowerCase().includes(query));
            renderPosts(filtered);
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('#catFilters button').forEach(b => {
                b.className = "whitespace-nowrap flex-none px-8 py-3.5 rounded-2xl border border-black/5 dark:border-white/5 text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:border-gold transition-all";
            });
            btn.className = "whitespace-nowrap flex-none px-8 py-3.5 rounded-2xl bg-gold text-white text-[10px] font-bold uppercase tracking-widest shadow-xl shadow-gold/20";
            if(cat === 'All') renderPosts(allPosts);
            else renderPosts(allPosts.filter(p => p._embedded?.['wp:term']?.[0]?.[0]?.name.toLowerCase().includes(cat.toLowerCase())));
        }

        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.documentElement.style.setProperty('--scroll-p', scrolled + '%');
            const btn = document.getElementById('backTop');
            if (window.scrollY > 800) { btn.classList.remove('opacity-0','invisible','translate-y-6'); btn.classList.add('opacity-100','visible','translate-y-0'); }
            else { btn.classList.add('opacity-0','invisible','translate-y-6'); btn.classList.remove('opacity-100','visible','translate-y-0'); }
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
            fetchPosts();
        });
    </script>
