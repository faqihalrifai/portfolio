    <button id="backTop" aria-label="Kembali ke atas" onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-12 right-12 w-16 h-16 rounded-3xl bg-gold text-white shadow-2xl opacity-0 invisible translate-y-6 transition-all z-50 flex items-center justify-center hover:bg-black active:scale-90 group">

    <script>
        // INIT SMOOTH SCROLL (Konfigurasi High-End)
        const lenis = new Lenis({
            duration: 1.4,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true,
            smoothWheel: true
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        let allPosts = [];

        // Fetch Data dari Pantheon
        async function fetchPosts() {
            const grid = document.getElementById('blogGrid');
            const antiCache = Date.now();
            try {
                const res = await fetch(`https://dev-faqihalrf.pantheonsite.io/wp-json/wp/v2/posts?_embed&per_page=45&cb=${antiCache}`);
                allPosts = await res.json();
                renderPosts(allPosts);
            } catch (err) {
                grid.innerHTML = '<p class="text-center col-span-full py-20 text-red-400 font-serif italic text-xl">Koneksi pangkalan data terputus.</p>';
            }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('blogGrid');
            const noRes = document.getElementById('noResults');
            
            if(posts.length === 0) { grid.innerHTML = ''; noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');

            grid.innerHTML = posts.map(post => {
                let img = 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800';
                if (post._embedded?.['wp:featuredmedia']?.[0]) {
                    img = `https://wsrv.nl/?url=${encodeURIComponent(post._embedded['wp:featuredmedia'][0].source_url)}&w=800&h=600&fit=cover&output=webp&q=80`;
                }
                const cat = post._embedded?.['wp:term']?.[0]?.[0]?.name || 'Insight';
                const date = new Date(post.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                const rawExcerpt = post.excerpt.rendered.replace(/<[^>]*>/g, '');
                const excerpt = rawExcerpt.length > 100 ? rawExcerpt.substring(0, 100) + '...' : rawExcerpt;

                return `
                    <article class="blog-card flex flex-col bg-white dark:bg-darkCard rounded-[3.5rem] overflow-hidden group">
                        <div class="h-80 overflow-hidden relative">
                            <img src="${img}" class="w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110" loading="lazy" alt="${post.title.rendered}">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                            <div class="absolute top-8 left-8 bg-white/90 dark:bg-black/80 backdrop-blur-md text-black dark:text-white text-[9px] font-black px-5 py-2.5 rounded-2xl uppercase tracking-[0.2em] border border-white/20">
                                ${cat}
                            </div>
                        </div>
                        <div class="p-12 flex flex-col flex-1 border-x border-b border-black/5 dark:border-white/5 rounded-b-[3.5rem]">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-6 flex items-center gap-3">
                                <span class="w-8 h-px bg-gold/30"></span> ${date}
                            </span>
                            <h2 class="text-2xl md:text-3xl font-serif font-bold dark:text-white mb-6 line-clamp-2 leading-tight group-hover:text-gold transition-colors italic">
                                ${post.title.rendered}
                            </h2>
                            <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed mb-10 line-clamp-2">
                                ${excerpt}
                            </p>
                            <a href="${post.link}" target="_blank" rel="noopener noreferrer" class="mt-auto text-[11px] font-black uppercase tracking-[0.3em] text-gold flex items-center gap-4 group/btn">
                                Pelajari Detail <i class="fas fa-chevron-right text-[8px] transition-transform group-hover/btn:translate-x-2"></i>
                            </a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Search & Filter
        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPosts.filter(p => p.title.rendered.toLowerCase().includes(query) || p.excerpt.rendered.toLowerCase().includes(query));
            renderPosts(filtered);
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('#catFilters button').forEach(b => {
                b.className = "px-8 py-3.5 rounded-2xl border border-black/5 dark:border-white/5 text-[11px] font-bold uppercase tracking-widest text-gray-400 hover:border-gold hover:text-gold transition-all";
            });
            btn.className = "px-8 py-3.5 rounded-2xl bg-gold text-white text-[11px] font-bold uppercase tracking-widest transition-all shadow-xl shadow-gold/20";
            if(cat === 'All') renderPosts(allPosts);
            else renderPosts(allPosts.filter(p => p._embedded?.['wp:term']?.[0]?.[0]?.name.toLowerCase().includes(cat.toLowerCase())));
        }

        // Scroll Logic
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.documentElement.style.setProperty('--scroll-p', scrolled + '%');

            const btn = document.getElementById('backTop');
            if (window.scrollY > 800) { 
                btn.classList.remove('opacity-0','invisible','translate-y-6'); 
                btn.classList.add('opacity-100','visible','translate-y-0'); 
            } else { 
                btn.classList.add('opacity-0','invisible','translate-y-6'); 
                btn.classList.remove('opacity-100','visible','translate-y-0'); 
            }
        });

        // Indexing Call
        function triggerIndexing(url) {
            if(confirm(`Kirim instruksi Google Indexing untuk tautan ini?\n\n${url}`)) {
                alert("Instruksi berhasil dikirim ke pangkalan data Google.");
            }
        }

        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
            fetchPosts();
        });
    </script>
