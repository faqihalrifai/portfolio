    <header class="pt-40 pb-12 px-6">

    <footer class="py-16 border-t border-black/5 dark:border-white/5 text-center">

            <div class="flex justify-center gap-8">
                <button onclick="triggerIndexing(window.location.href)" class="w-10 h-10 rounded-full border border-black/5 dark:border-white/10 flex items-center justify-center text-gray-300 hover:text-gold transition-all" title="Push Indexing">

    <button id="backTop" onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-8 right-8 w-12 h-12 rounded-2xl bg-gold text-white shadow-2xl opacity-0 invisible transition-all z-50 flex items-center justify-center hover:scale-110">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        // Init Smooth Scroll (Lerp 0.1 for Grounded Feel)
        const lenis = new Lenis({ duration: 1.2, lerp: 0.1, smooth: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        let allPosts = [];

        // Fetch Real-time from Pantheon
        async function fetchPosts() {
            const grid = document.getElementById('blogGrid');
            const antiCache = new Date().getTime();
            try {
                const res = await fetch(`https://dev-faqihalrf.pantheonsite.io/wp-json/wp/v2/posts?_embed&per_page=45&cb=${antiCache}`);
                allPosts = await res.json();
                renderPosts(allPosts);
            } catch (err) {
                grid.innerHTML = '<p class="text-center col-span-full py-20 text-red-500 font-bold">Koneksi pangkalan data terputus.</p>';
            }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('blogGrid');
            const noRes = document.getElementById('noResults');
            
            if(posts.length === 0) { grid.innerHTML = ''; noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');

            grid.innerHTML = posts.map(post => {
                let img = 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600';
                if (post._embedded?.['wp:featuredmedia']?.[0]) {
                    img = `https://wsrv.nl/?url=${encodeURIComponent(post._embedded['wp:featuredmedia'][0].source_url)}&w=600&h=450&fit=cover&output=webp`;
                }
                const cat = post._embedded?.['wp:term']?.[0]?.[0]?.name || 'Insight';
                const date = new Date(post.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                const rawExcerpt = post.excerpt.rendered.replace(/<[^>]*>/g, '');
                const excerpt = rawExcerpt.length > 110 ? rawExcerpt.substring(0, 110) + '...' : rawExcerpt;

                return `
                    <article class="blog-card flex flex-col bg-white dark:bg-darkCard rounded-[2.5rem] overflow-hidden relative group">
                        <div class="h-64 overflow-hidden relative">
                            <img src="${img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110 img-high-res" loading="lazy" alt="${post.title.rendered}">
                            <div class="absolute top-6 left-6 bg-black/70 backdrop-blur-md text-white text-[8px] font-black px-4 py-2 rounded-full uppercase tracking-[0.2em] border border-white/10">${cat}</div>
                            <button onclick="triggerIndexing('${post.link}')" class="absolute top-6 right-6 w-10 h-10 bg-gold text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-black">
                                <i class="fas fa-satellite-dish text-xs"></i>
                            </button>
                        </div>
                        <div class="p-8 md:p-10 flex flex-col flex-1 border-x border-b border-black/5 dark:border-white/5 rounded-b-[2.5rem]">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-4 flex items-center gap-2"><i class="far fa-calendar-check text-gold"></i> ${date}</span>
                            <h2 class="text-xl md:text-2xl font-serif font-bold dark:text-white mb-4 line-clamp-2 leading-tight group-hover:text-gold transition-colors">${post.title.rendered}</h2>
                            <p class="text-gray-500 dark:text-gray-400 text-xs md:text-sm leading-relaxed mb-8 line-clamp-2">${excerpt}</p>
                            <a href="${post.link}" target="_blank" class="mt-auto text-[11px] font-black uppercase tracking-[0.2em] text-gold flex items-center gap-3 group/btn">
                                Pelajari Detail <i class="fas fa-long-arrow-alt-right transition-transform group-hover/btn:translate-x-2"></i>
                            </a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Live Logic
        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPosts.filter(p => p.title.rendered.toLowerCase().includes(query) || p.excerpt.rendered.toLowerCase().includes(query));
            renderPosts(filtered);
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('#catFilters button').forEach(b => b.className = "px-6 py-2.5 rounded-full border border-black/5 dark:border-white/10 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:border-gold transition-all");
            btn.className = "px-6 py-2.5 rounded-full border border-gold bg-gold text-white text-[10px] font-bold uppercase tracking-widest transition-all shadow-lg shadow-gold/20";
            if(cat === 'All') renderPosts(allPosts);
            else renderPosts(allPosts.filter(p => p._embedded?.['wp:term']?.[0]?.[0]?.name.toLowerCase().includes(cat.toLowerCase())));
        }

        // UI Scroll Progress
        window.addEventListener('scroll', () => {
            const h = document.documentElement, b = document.body, st = 'scrollTop', sh = 'scrollHeight';
            const scrolled = (h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100;
            document.documentElement.style.setProperty('--scroll-p', scrolled + '%');

            const btn = document.getElementById('backTop');
            if (window.scrollY > 600) { btn.classList.remove('opacity-0','invisible'); btn.classList.add('opacity-100','visible'); }
            else { btn.classList.add('opacity-0','invisible'); btn.classList.remove('opacity-100','visible'); }
        });

        // Satelite Notification
        function triggerIndexing(url) {
            if(confirm(`Kirim instruksi Google Indexing untuk tautan ini?\n\n${url}`)) {
                alert("Instruksi berhasil dikirim ke pangkalan data Google.");
            }
        }

        // Theme Setup
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
            fetchPosts();
        });
    </script>
