        // 2. Logic Paginasi
        const itemsPerPage = 10;
        let currentPage = 1;
        const totalPages = Math.ceil(allTestimonials.length / itemsPerPage);

        function renderTestimonials(page) {
            const grid = document.getElementById('testimonial-grid');
            grid.innerHTML = ''; 
            
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = allTestimonials.slice(start, end);

            currentItems.forEach((t, index) => {
                const stars = Array(t.rating).fill('<i class="fas fa-star text-gold text-[12px] md:text-[13px]"></i>').join('');
                const delay = index * 0.05; 

                const cardHTML = `
                <div class="testimonial-card bg-white dark:bg-[#15161a] p-6 md:p-8 rounded-[1.5rem] relative border border-black/5 dark:border-white/5 flex flex-col h-full shadow-sm animate-fade-in group" style="animation-delay: ${delay}s">
                    
                    <!-- Header: Avatar, Nama, Pekerjaan, Ikon Verifikasi -->
                    <div class="flex items-center gap-4 mb-5">
                        <img src="https://randomuser.me/api/portraits/${t.avatar}" class="w-12 h-12 md:w-14 md:h-14 rounded-full object-cover border-2 border-lightGray dark:border-darkBg shadow-sm" alt="Foto ${t.name}" loading="lazy">
                        <div>
                            <h3 class="font-bold text-sm md:text-base text-darkBlack dark:text-white flex items-center gap-1.5">
                                ${t.name}
                                <i class="fas fa-check-circle text-blue-500 text-[12px]" title="Klien Terverifikasi"></i>
                            </h3>
                            <p class="text-[11px] md:text-xs text-textGray dark:text-darkSub mt-0.5">${t.role}</p>
                        </div>
                    </div>

                    <!-- Bintang Rating & Tanggal (Desain Sejajar) -->
                    <div class="flex items-center gap-3 mb-4">
                        <div class="flex gap-0.5">${stars}</div>
                        <div class="w-1 h-1 rounded-full bg-gray-300 dark:bg-gray-600"></div>
                        <div class="text-[11px] md:text-xs text-textGray dark:text-darkSub flex items-center gap-1.5 font-medium">
                            <i class="far fa-calendar-alt"></i> ${t.date}
                        </div>
                    </div>

                    <!-- Teks Ulasan Sederhana -->
                    <p class="text-textGray dark:text-darkText text-[13px] md:text-[14px] leading-relaxed font-medium flex-grow">
                        "${t.text}"
                    </p>
                </div>`;
                
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function renderPagination() {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';

            // Tombol Prev
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '<i class="fas fa-chevron-left text-sm"></i>';
            prevBtn.className = `w-10 h-10 md:w-12 md:h-12 rounded-full border border-black/10 dark:border-white/10 flex items-center justify-center transition-all ${currentPage === 1 ? 'opacity-50 cursor-not-allowed text-gray-400 bg-gray-50 dark:bg-black/20' : 'hover:bg-gold hover:text-white hover:border-gold text-darkBlack dark:text-white bg-white dark:bg-darkCard shadow-sm hover:shadow-md'}`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { if(currentPage > 1) changePage(currentPage - 1); };
            container.appendChild(prevBtn);

            // Tab Angka
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                
                if (i === currentPage) {
                    btn.className = 'w-10 h-10 md:w-12 md:h-12 rounded-full bg-gold text-white font-bold text-sm md:text-base flex items-center justify-center shadow-lg shadow-gold/30 transform scale-105';
                } else {
                    btn.className = 'w-10 h-10 md:w-12 md:h-12 rounded-full border border-black/10 dark:border-white/10 text-darkBlack dark:text-white font-bold text-sm md:text-base flex items-center justify-center hover:bg-lightGray dark:hover:bg-white/5 transition-all bg-white dark:bg-darkCard shadow-sm hover:shadow-md';
                    btn.onclick = () => changePage(i);
                }
                container.appendChild(btn);
            }

            // Tombol Next
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '<i class="fas fa-chevron-right text-sm"></i>';
            nextBtn.className = `w-10 h-10 md:w-12 md:h-12 rounded-full border border-black/10 dark:border-white/10 flex items-center justify-center transition-all ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed text-gray-400 bg-gray-50 dark:bg-black/20' : 'hover:bg-gold hover:text-white hover:border-gold text-darkBlack dark:text-white bg-white dark:bg-darkCard shadow-sm hover:shadow-md'}`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { if(currentPage < totalPages) changePage(currentPage + 1); };
            container.appendChild(nextBtn);
        }

        function changePage(page) {
            currentPage = page;
            renderTestimonials(currentPage);
            renderPagination();
            
            // Scroll halus ke atas area testimoni setiap ganti halaman
            const header = document.getElementById('reviews-header');
            const navHeight = document.getElementById('navbar').offsetHeight;
            const targetPosition = header.getBoundingClientRect().top + window.scrollY - navHeight - 20;
            
            // Scroll Native murni
            window.scrollTo({
                top: targetPosition,
                behavior: 'smooth'
            });
        }

        // 3. Inisialisasi Utama
        document.addEventListener('DOMContentLoaded', () => {
            // Setup Theme Toggle
            document.querySelectorAll('.theme-toggle').forEach(btn => { 
                btn.addEventListener('click', () => { 
                    document.documentElement.classList.toggle('dark'); 
                    localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; 
                }); 
            });
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { 
                document.documentElement.classList.add('dark'); 
            }

            // Render Awal Testimoni
            renderTestimonials(currentPage);
            renderPagination();
        });
    </script>
